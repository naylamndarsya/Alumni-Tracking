<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<title>Sistem Tracer Alumni</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-100">

<div class="max-w-6xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">

<h1 class="text-2xl font-bold mb-6">
Sistem Pelacakan Alumni
</h1>

<h2 class="font-semibold mb-2">Tambah Alumni</h2>

<input id="nama" placeholder="Nama"
class="border p-2 w-full mb-2 rounded">

<input id="prodi" placeholder="Prodi"
class="border p-2 w-full mb-2 rounded">

<input id="tahun" type="number" placeholder="Tahun Lulus"
class="border p-2 w-full mb-2 rounded">

<button onclick="tambahAlumni()"
class="bg-blue-500 text-white px-4 py-2 rounded">
Tambah Alumni
</button>

<h2 class="font-semibold mt-8">
Update Data Pekerjaan
</h2>

<input id="trackNama" placeholder="Nama Alumni"
class="border p-2 w-full mb-2 rounded">

<input id="perusahaan" placeholder="Perusahaan"
class="border p-2 w-full mb-2 rounded">

<input id="jabatan" placeholder="Jabatan"
class="border p-2 w-full mb-2 rounded">

<input id="lokasi" placeholder="Lokasi"
class="border p-2 w-full mb-2 rounded">

<button onclick="updateTracking()"
class="bg-green-500 text-white px-4 py-2 rounded">
Update Status
</button>

<h2 class="font-semibold mt-8">
Data Alumni
</h2>

<input 
id="search"
placeholder="Cari nama alumni..."
class="border p-2 w-full mb-4 rounded"
oninput="loadAlumni()">

<table class="w-full border">

<thead class="bg-gray-200">

<tr>

<th>Nama</th>
<th>Prodi</th>
<th>Tahun</th>
<th>Status</th>
<th>Perusahaan</th>
<th>Jabatan</th>
<th>Lokasi</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="alumniTable"></tbody>

</table>

</div>

<script src="js/supabaseClient.js"></script>
<script src="js/alumniService.js"></script>
<script src="js/app.js"></script>

</body>
</html>
